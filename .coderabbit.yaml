# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!target/**"
    - "!node_modules/**"
    - "!dist/**"
    - "!coverage/**"
  path_instructions:
    - path: "**"
      instructions: >-
        Focus on correctness, safety, maintainability, and clear developer
        experience. Pay special attention to destructive file operations.
        Starbase should be local-first and should not send repo contents
        externally by default.
